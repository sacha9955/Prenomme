name: Prenomme

options:
  bundleIdPrefix: com.sacha9955
  deploymentTarget:
    iOS: "17.5"
  defaultConfig: Debug
  xcodeVersion: "16.3"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.29.3"

settings:
  SWIFT_VERSION: "5.10"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
  DEVELOPMENT_TEAM: Y9U6L9TB4B

targets:
  Prenomme:
    type: application
    platform: iOS
    deploymentTarget: "17.5"
    sources:
      - path: App
      - path: Models
      - path: Views
      - path: Services
    resources:
      - path: Resources/Assets.xcassets
    postBuildScripts:
      - name: Copy names.sqlite into bundle
        script: |
          cp "${SRCROOT}/Resources/names.sqlite" "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/names.sqlite"
        inputFiles:
          - ${SRCROOT}/Resources/names.sqlite
        outputFiles:
          - ${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/names.sqlite
    entitlements:
      path: Prenomme.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.sacha9955.prenomme
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.security.application-groups:
          - group.com.sacha9955.prenomme
        com.apple.developer.cloudkit.environment: development
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sacha9955.prenomme
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
      INFOPLIST_KEY_NSFaceIDUsageDescription: ""
    dependencies:
      - package: GRDB
      - target: PrenommeWidget
        embed: true

  PrenommeWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.5"
    sources:
      - path: Widget
      - path: Models
      - path: Services
    postBuildScripts:
      - name: Copy names.sqlite into widget bundle
        script: |
          cp "${SRCROOT}/Resources/names.sqlite" "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/names.sqlite"
        inputFiles:
          - ${SRCROOT}/Resources/names.sqlite
        outputFiles:
          - ${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/names.sqlite
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sacha9955.prenomme.widget
      INFOPLIST_FILE: Widget/Info.plist
      GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: GRDB
    entitlements:
      path: PrenommeWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sacha9955.prenomme

  PrenommeTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.5"
    sources:
      - path: Tests/PrenommeTests
    dependencies:
      - target: Prenomme
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sacha9955.prenomme.tests
      GENERATE_INFOPLIST_FILE: YES

